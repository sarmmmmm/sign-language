<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-Language Translator</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">
            <span class="cute-font blue">American Sign </span>
            <span class="cute-font blue">-</span>
            <span class="cute-font blue">Language</span>
            <span style="margin-left: 10px; color: #757575; font-size: 16px; font-weight: normal;">(ASL)</span>
        </div>
    </header>

    <main class="cute-translator-container">
        
        <div class="cute-card camera-card">
            <div class="cute-card-header">
                American Sign Language (ASL)
            </div>
           
            <div class = "Image-preview-area">  

                <img id="image-preview" src="" alt="Image Preview" style="display:none; max-width: 100%; height: auto; border-radius: 8px; margin-top: 10px;">
                <div id="image-info" style="display:none; margin-top:10px; text-align:center;">
                     <p><strong>📁 ชื่อไฟล์:</strong> <span id="file-name">              </span></p>
                    <p><strong>📊 ขนาด:</strong> <span id="file-size">                </span></p>
                    <p><strong>🏷️ ประเภท:</strong> <span id="file-type">               </span></p>
                </div>
            </div>

            <div class="cute-card-footer">
                <input type="file" id="Image_uploaded" accept="image/*", style="display:none;" > 
                <button  id="file-control-btn">Uploaded </button>
            </div>
        </div>

        <div class="cute-card prediction-card">
            <div class="cute-card-header">
                English Meaning
            </div>
            <div class="result-display-area">
                <div id="result-text">Meaning will appear here...</div>
            </div>
            <div class="cute-card-footer">
                <button id="copy-result-btn">Copy </button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
